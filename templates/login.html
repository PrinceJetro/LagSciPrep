<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance in progress</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b1a2e 0%, #1b2f45 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* subtle animated gear background (pure css) */
    body::before {
      content: '';
      position: absolute;
      width: 180%;
      height: 180%;
      top: -40%;
      left: -40%;
      background: radial-gradient(circle at 30% 40%, rgba(100, 180, 255, 0.03) 0%, transparent 30%),
                  radial-gradient(circle at 70% 80%, rgba(200, 230, 255, 0.04) 0%, transparent 35%),
                  repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 8px);
      animation: slowDrift 42s infinite alternate ease-in-out;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes slowDrift {
      0% { transform: rotate(0deg) scale(1); }
      100% { transform: rotate(3deg) scale(1.05); }
    }

    .card {
      background: rgba(18, 28, 40, 0.75);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(90, 150, 220, 0.25);
      border-radius: 3.5rem;
      padding: 3rem 2.5rem 3.2rem;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 35px 75px rgba(0, 10, 25, 0.6), 0 0 0 1px rgba(160, 210, 255, 0.1) inset;
      text-align: center;
      position: relative;
      z-index: 10;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.01);
    }

    /* icon / js animated spinner */
    .gear-wrapper {
      margin-bottom: 2rem;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      align-items: center;
    }

    .gear-icon {
      font-size: 5rem;
      line-height: 1;
      display: inline-block;
      filter: drop-shadow(0 8px 15px rgba(0,30,50,0.7));
      animation: rotateGear 4s infinite linear;
      transform-origin: 50% 52%; /* fine-tuned for emoji center */
    }

    .gear-icon:nth-child(2) {
      font-size: 3.8rem;
      animation-duration: 5.2s;
      animation-direction: reverse;
      opacity: 0.9;
    }

    .gear-icon:nth-child(3) {
      font-size: 4.3rem;
      animation-duration: 3.4s;
      opacity: 0.8;
    }

    @keyframes rotateGear {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: clamp(2.6rem, 8vw, 4.2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(130deg, #e1efff, #b3d9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.65rem;
      text-shadow: 0 2px 10px rgba(0,160,255,0.2);
      line-height: 1.2;
    }

    .message {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 360;
      color: rgba(210, 235, 255, 0.9);
      margin-bottom: 2.5rem;
      border-bottom: 1px dashed rgba(120, 180, 255, 0.4);
      padding-bottom: 1.2rem;
      display: inline-block;
      backdrop-filter: blur(5px);
    }

    .progress-indicator {
      background: rgba(0, 20, 40, 0.6);
      border-radius: 100px;
      padding: 0.8rem 2rem;
      margin: 1.8rem 0 2.2rem;
      border: 1px solid rgba(70, 150, 240, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .dot-pulse {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #5bb4ff;
      box-shadow: 0 0 15px #5bb4ff;
      animation: pulseDot 1.6s infinite ease-in-out both;
    }

    .dot:nth-child(1) { animation-delay: -0.4s; background: #7ac7ff; }
    .dot:nth-child(2) { animation-delay: -0.2s; background: #50aeff; }
    .dot:nth-child(3) { animation-delay: 0s; background: #2f9eff; }

    @keyframes pulseDot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 25px currentColor; }
    }

    .eta-text {
      color: #b6d9ff;
      font-weight: 350;
      letter-spacing: 0.5px;
      font-size: 1.2rem;
    }

    .eta-text span {
      font-weight: 500;
      color: white;
      background: rgba(0, 100, 200, 0.3);
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      margin-left: 0.4rem;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .countdown-box {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      color: #c1dfff;
      margin: 2rem 0 1rem;
      font-size: 1.3rem;
      background: rgba(0, 30, 50, 0.4);
      padding: 0.8rem 1.8rem;
      border-radius: 70px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(80, 160, 255, 0.3);
    }

    #timer {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 2rem;
      font-weight: 500;
      background: #0d1f30;
      padding: 0.2rem 1.1rem;
      border-radius: 60px;
      color: #b0e0ff;
      letter-spacing: 3px;
      text-shadow: 0 0 8px #0055ff80;
      border: 1px solid #3a6a9f;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
    }

    .refresh-note {
      margin-top: 2.5rem;
      font-size: 1.1rem;
      color: #7d9ec0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.8rem 1.5rem;
      border-radius: 60px;
      border: 1px solid #1e405e;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .refresh-note:hover {
      background: rgba(20, 60, 100, 0.5);
      border-color: #3f8bcb;
      color: #d5edff;
    }

    .refresh-note:active {
      transform: scale(0.97);
    }

    .refresh-note span {
      font-size: 1.5rem;
      line-height: 1;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #34648b;
    }

    /* small gear rotation speed variation via js (optional) */
  </style>
</head>
<body>
  <div class="card" role="main" aria-labelledby="maintenance-title">
    <div class="gear-wrapper">
      <span class="gear-icon" aria-hidden="true">⚙️</span>
      <span class="gear-icon" aria-hidden="true">⚙️</span>
      <span class="gear-icon" aria-hidden="true">⚙️</span>
    </div>

    <h1 id="maintenance-title">website maintenance</h1>
    <div class="message">in progress · check back later</div>

    <!-- live progress pulse -->
    <div class="progress-indicator">
      <div class="dot-pulse" aria-label="system update in progress">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="eta-text">
        estimating <span>~ 24 hrs</span> until 6 PM March 7
      </div>
    </div>

    <!-- dynamic countdown / last checked timer (js animated) -->
    <div class="countdown-box">
      <span style="opacity:0.9;">🔄</span>
      <span id="timer-label">check back by 6 PM tomorrow</span>
      <span id="timer">04:59</span>
    </div>

    <!-- clickable refresh hint (soft refresh) -->
    <div class="refresh-note" id="refreshTrigger" tabindex="0" role="button" aria-label="simulate refresh attempt">
      <span>🔁</span> click to retry connection
      <span style="font-size:1.1rem; opacity:0.7;">↻</span>
    </div>

    <footer>
      ⚡ our team is working · thanks for your patience
    </footer>
  </div>

  <script>
    (function() {
      // ---- countdown timer to next 6pm (approx. 24 hrs) ----
      const timerElement = document.getElementById('timer');
      const refreshTrigger = document.getElementById('refreshTrigger');

      // compute seconds until the *next* 18:00 (6 PM) local time
      function computeTimeLeft() {
        const now = new Date();
        let target = new Date(now);
        // if it's already past 6pm, schedule for tomorrow
        if (now.getHours() >= 18) {
          target.setDate(now.getDate() + 1);
        }
        target.setHours(18, 0, 0, 0);
        const diff = Math.floor((target - now) / 1000);
        return diff > 0 ? diff : 0;
      }

      // format hh:mm:ss (always two digits)
      function formatTime(seconds) {
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        return `${hrs.toString().padStart(2, '0')}:
               ${mins.toString().padStart(2, '0')}:
               ${secs.toString().padStart(2, '0')}`.replace(/\s+/g, '');
      }

      // initial update using real time
      let timeLeft = computeTimeLeft();
      timerElement.textContent = formatTime(timeLeft);

      // update timer every second until zero (no automatic reset)
      const countdownInterval = setInterval(() => {
        timeLeft = computeTimeLeft();
        timerElement.textContent = formatTime(timeLeft);
        if (timeLeft <= 0) {
          clearInterval(countdownInterval);
          // optional visual cue when target reached
          timerElement.textContent = '00:00:00';
        }
      }, 1000);

      // ---- click on "refresh note" simulates checking back (with user feedback) ----
      refreshTrigger.addEventListener('click', function(e) {
        e.stopPropagation();
        
        // Provide immediate feedback: change cursor, animate
        refreshTrigger.style.pointerEvents = 'none'; // disable double-click spam
        
        // Save original text to restore later
        const originalHTML = refreshTrigger.innerHTML;
        refreshTrigger.innerHTML = `<span>⏳</span> checking for updates... <span> </span>`;
        
        // after a short delay, show "still in maintenance" message and revert
        setTimeout(() => {
          refreshTrigger.innerHTML = `<span>🔔</span> still in maintenance · try again later <span>↻</span>`;
          
          // flash the timer background to indicate check
          timerElement.style.transition = 'background 0.2s, box-shadow 0.2s';
          timerElement.style.background = '#194b66';
          timerElement.style.boxShadow = '0 0 20px #0077ff';
          setTimeout(() => {
            timerElement.style.background = '#0d1f30';
            timerElement.style.boxShadow = 'inset 0 2px 8px rgba(0,0,0,0.6)';
          }, 300);
          
          // after 2 more seconds revert the refresh button text to original but keep the message friendly
          setTimeout(() => {
            refreshTrigger.innerHTML = originalHTML; // original with arrow etc.
            refreshTrigger.style.pointerEvents = 'auto';
          }, 2000);
        }, 800);
      });

      // also allow keyboard "Enter" on the pseudo-button for accessibility
      refreshTrigger.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          refreshTrigger.click();
        }
      });

      // tiny random gear speed factor (just for fun via CSS variable not needed; but we can tweak animation durations slightly)
      const gearIcons = document.querySelectorAll('.gear-icon');
      if (gearIcons.length >= 3) {
        // make each gear spin with slightly different random durations (between 2.8s and 6s)
        // but keep base rotation direction as defined. We override inline style.
        gearIcons.forEach((gear, index) => {
          const duration = (Math.random() * 3.2 + 2.8).toFixed(2); // between 2.8 and 6.0 sec
          gear.style.animationDuration = `${duration}s`;
          // randomly reverse one of them already reversed? but keep css rules basically
          if (index === 1) {
            // second gear is reversed in CSS, keep reversed but adjust speed again
            gear.style.animationDuration = `${(Math.random() * 3.5 + 3.8).toFixed(2)}s`;
          }
          if (index === 2) {
            gear.style.animationDuration = `${(Math.random() * 2.5 + 2.9).toFixed(2)}s`;
          }
        });
      }

      // small detail: update the "estimating" text every 30 seconds? not needed, but keep lively.
      const etaSpan = document.querySelector('.eta-text span');
      const etaMessages = ['~ 24 hrs', '~ 20 hrs', '~ 18 hrs', '~ 12 hrs', '~ 6 hrs', '~ 3 hrs', '~ 1 hr'];
      let msgIndex = 0;
      setInterval(() => {
        // slowly cycle through ETA to give dynamic feeling
        msgIndex = (msgIndex + 1) % etaMessages.length;
        if (etaSpan) {
          etaSpan.style.transition = 'opacity 0.3s';
          etaSpan.style.opacity = '0.6';
          setTimeout(() => {
            if (etaSpan) {
              etaSpan.textContent = etaMessages[msgIndex];
              etaSpan.style.opacity = '1';
            }
          }, 150);
        }
      }, 7000); // every 7 seconds
    })();
  </script>
</body>
</html>
